AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: exdox serverless backend for receipt uploads, OCR parsing, and RDS persistence.

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
  ReceiptBucketName:
    Type: String
  OpenAIApiKey:
    Type: String
    NoEcho: true
  OpenAIModel:
    Type: String
    Default: gpt-4.1-nano
  JwtSecret:
    Type: String
    NoEcho: true
  InviteEmailFrom:
    Type: String
    Default: ''
  InviteBaseUrl:
    Type: String
    Default: 'exdox://signup'
  ReceiptStoreMode:
    Type: String
    Default: s3
  DbHost:
    Type: String
    Default: ''
  DbPort:
    Type: Number
    Default: 3306
  DbName:
    Type: String
    Default: receiptflow
  DbUser:
    Type: String
    Default: ''
  DbPassword:
    Type: String
    Default: ''
    NoEcho: true
  DbIamAuthEnabled:
    Type: String
    Default: 'false'
  DbIamRegion:
    Type: String
    Default: 'eu-west-2'

Globals:
  Function:
    Runtime: nodejs22.x
    MemorySize: 1024
    Timeout: 60
    Handler: dist/aws/index.handler
    CodeUri: ..
    Environment:
      Variables:
        RECEIPT_BUCKET_NAME: !Ref ReceiptBucketName
        OPENAI_API_KEY: !Ref OpenAIApiKey
        OPENAI_MODEL: !Ref OpenAIModel
        JWT_SECRET: !Ref JwtSecret
        INVITE_EMAIL_FROM: !Ref InviteEmailFrom
        INVITE_BASE_URL: !Ref InviteBaseUrl
        RECEIPT_STORE_MODE: !Ref ReceiptStoreMode
        DB_HOST: !Ref DbHost
        DB_PORT: !Ref DbPort
        DB_NAME: !Ref DbName
        DB_USER: !Ref DbUser
        DB_PASSWORD: !Ref DbPassword
        DB_IAM_AUTH_ENABLED: !Ref DbIamAuthEnabled
        DB_IAM_REGION: !Ref DbIamRegion
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'

Resources:
  ReceiptApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref EnvironmentName
      SecurityPolicy: SecurityPolicy_TLS12_PFS_2025_EDGE
      EndpointAccessMode: STRICT
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      BinaryMediaTypes:
        - multipart/form-data
        - application/pdf
        - image/jpeg
        - image/png
        - image/webp

  ReceiptStorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref ReceiptBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  ReceiptStorageBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ReceiptStorageBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub '${ReceiptStorageBucket.Arn}'
              - !Sub '${ReceiptStorageBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: false
          - Sid: DenyMissingEncryptionHeader
            Effect: Deny
            Principal: '*'
            Action: 's3:PutObject'
            Resource: !Sub '${ReceiptStorageBucket.Arn}/*'
            Condition:
              Null:
                s3:x-amz-server-side-encryption: true
          - Sid: DenyIncorrectEncryptionHeader
            Effect: Deny
            Principal: '*'
            Action: 's3:PutObject'
            Resource: !Sub '${ReceiptStorageBucket.Arn}/*'
            Condition:
              StringNotEquals:
                s3:x-amz-server-side-encryption: AES256

  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/health.handler
      Events:
        HealthRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /health
            Method: GET

  CreateUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/createUploadUrl.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
      Events:
        UploadRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /upload/presign
            Method: POST

  ProcessExpenseFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/processExpense.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
        - AWSLambdaBasicExecutionRole
      Events:
        ProcessLegacyRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /api/v1/expenses/process
            Method: POST
        ProcessReceiptsRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /receipts/process
            Method: POST

  ListReceiptsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/listReceipts.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
      Events:
        ListReceiptsRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /receipts
            Method: GET

  ListClaimsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/listClaims.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
      Events:
        ListClaimsRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /claims
            Method: GET

  CreateClaimFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/createClaim.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
      Events:
        CreateClaimRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /claims
            Method: POST

  AttachReceiptToClaimFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/attachReceiptToClaim.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
      Events:
        AttachReceiptToClaimRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /claims/attach
            Method: POST

  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/login.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
      Events:
        LoginRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /login
            Method: POST

  RegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/register.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
      Events:
        RegisterRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /register
            Method: POST

  InviteFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/invite.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
      Events:
        InviteRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /invite
            Method: POST

  GetSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/getSession.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
      Events:
        GetSessionRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /session
            Method: GET

  GetReceiptFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/getReceipt.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
      Events:
        GetReceiptRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /receipts/{id}
            Method: GET

  UpdateReceiptFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/updateReceipt.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
      Events:
        UpdateReceiptRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /receipts/{id}
            Method: PUT

  DeleteReceiptFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/deleteReceipt.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
      Events:
        DeleteReceiptRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /receipts/{id}
            Method: DELETE

  GetReceiptAssetUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/getReceiptAssetUrl.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
      Events:
        GetReceiptAssetUrlRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /receipts/{id}/asset-url
            Method: GET

  GetClaimFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/getClaim.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
      Events:
        GetClaimRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /claims/{id}
            Method: GET

  UpdateClaimFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/updateClaim.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
      Events:
        UpdateClaimRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /claims/{id}
            Method: PUT

  GetSettingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/getSettings.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
      Events:
        GetSettingsRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /settings
            Method: GET

  UpdateSettingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/updateSettings.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
      Events:
        UpdateSettingsRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /settings
            Method: PUT

  ListSupplierRulesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/listSupplierRules.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
      Events:
        ListSupplierRulesRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /rules
            Method: GET

  UpsertSupplierRuleFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/upsertSupplierRule.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
      Events:
        UpsertSupplierRuleRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /rules
            Method: POST

  DeleteSupplierRuleFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/deleteSupplierRule.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
      Events:
        DeleteSupplierRuleRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /rules/{id}
            Method: DELETE

  ListReconciliationFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/listReconciliation.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
      Events:
        ListReconciliationRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /reconciliation
            Method: GET

  MatchReconciliationFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/matchReconciliation.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
      Events:
        MatchReconciliationRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /reconciliation/match
            Method: POST

  CreateRequisitionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/createRequisition.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
      Events:
        CreateRequisitionRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /requisitions
            Method: POST

  BankCallbackFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/aws/handlers/bankCallback.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReceiptBucketName
      Events:
        BankCallbackRoute:
          Type: Api
          Properties:
            RestApiId: !Ref ReceiptApi
            Path: /bank-callback
            Method: GET

Outputs:
  ApiBaseUrl:
    Value: !Sub 'https://${ReceiptApi}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}'
  ReceiptBucket:
    Value: !Ref ReceiptStorageBucket
