name: Deploy Exdox Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: prod
    env:
      AWS_REGION: eu-west-2
      STACK_NAME: receiptflow-expenses-prod
      ENVIRONMENT_NAME: prod
      RECEIPT_BUCKET_NAME: ${{ secrets.RECEIPT_BUCKET_NAME }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      INVITE_EMAIL_FROM: ${{ secrets.INVITE_EMAIL_FROM }}
      INVITE_BASE_URL: ${{ secrets.INVITE_BASE_URL }}
      RECEIPT_STORE_MODE: ${{ secrets.RECEIPT_STORE_MODE }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_IAM_AUTH_ENABLED: ${{ secrets.DB_IAM_AUTH_ENABLED }}
      DB_IAM_REGION: ${{ secrets.DB_IAM_REGION }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_CHECKOUT_SUCCESS_URL: ${{ secrets.STRIPE_CHECKOUT_SUCCESS_URL }}
      STRIPE_CHECKOUT_CANCEL_URL: ${{ secrets.STRIPE_CHECKOUT_CANCEL_URL }}
      STRIPE_BILLING_PORTAL_RETURN_URL: ${{ secrets.STRIPE_BILLING_PORTAL_RETURN_URL }}
      STRIPE_PRICE_CAPTURE_MONTHLY: ${{ secrets.STRIPE_PRICE_CAPTURE_MONTHLY }}
      STRIPE_PRICE_CAPTURE_ANNUAL: ${{ secrets.STRIPE_PRICE_CAPTURE_ANNUAL }}
      STRIPE_PRICE_CONTROL_MONTHLY: ${{ secrets.STRIPE_PRICE_CONTROL_MONTHLY }}
      STRIPE_PRICE_CONTROL_ANNUAL: ${{ secrets.STRIPE_PRICE_CONTROL_ANNUAL }}
      STRIPE_PRICE_OPERATIONS_MONTHLY: ${{ secrets.STRIPE_PRICE_OPERATIONS_MONTHLY }}
      STRIPE_PRICE_OPERATIONS_ANNUAL: ${{ secrets.STRIPE_PRICE_OPERATIONS_ANNUAL }}
      STRIPE_PRICE_ENTERPRISE_MONTHLY: ${{ secrets.STRIPE_PRICE_ENTERPRISE_MONTHLY }}
      STRIPE_PRICE_ENTERPRISE_ANNUAL: ${{ secrets.STRIPE_PRICE_ENTERPRISE_ANNUAL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Prepare deployment package
        run: |
          rm -rf deploy-package
          mkdir -p deploy-package
          cp -R dist deploy-package/dist
          cp -R node_modules deploy-package/node_modules
          cp package.json package-lock.json deploy-package/
          cp infra/template.yaml infra/template.deploy.yaml
          python3 - <<'PY'
          from pathlib import Path

          template_path = Path("infra/template.deploy.yaml")
          template = template_path.read_text()
          template_path.write_text(template.replace("    CodeUri: ..\n", "    CodeUri: ../deploy-package\n", 1))
          PY

      - name: Validate deployment secrets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          RECEIPT_BUCKET_NAME: ${{ secrets.RECEIPT_BUCKET_NAME }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          test -n "$AWS_ACCESS_KEY_ID" || { echo "Missing AWS_ACCESS_KEY_ID GitHub secret"; exit 1; }
          test -n "$AWS_SECRET_ACCESS_KEY" || { echo "Missing AWS_SECRET_ACCESS_KEY GitHub secret"; exit 1; }
          test -n "$RECEIPT_BUCKET_NAME" || { echo "Missing RECEIPT_BUCKET_NAME GitHub secret"; exit 1; }
          test -n "$OPENAI_API_KEY" || { echo "Missing OPENAI_API_KEY GitHub secret"; exit 1; }
          test -n "$JWT_SECRET" || { echo "Missing JWT_SECRET GitHub secret"; exit 1; }

      - name: Set up AWS SAM
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials with session token
        uses: aws-actions/configure-aws-credentials@v4
        if: ${{ env.AWS_SESSION_TOKEN != '' }}
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ env.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials without session token
        uses: aws-actions/configure-aws-credentials@v4
        if: ${{ env.AWS_SESSION_TOKEN == '' }}
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build SAM template
        run: sam build --template-file infra/template.deploy.yaml

      - name: Deploy production stack
        run: |
          add_if_set() {
            local key="$1"
            local value="$2"
            if [ -n "$value" ]; then
              parameter_overrides+=("$key=$value")
            fi
          }

          parameter_overrides=(
            "EnvironmentName=$ENVIRONMENT_NAME"
            "ReceiptBucketName=$RECEIPT_BUCKET_NAME"
            "OpenAIApiKey=$OPENAI_API_KEY"
            "OpenAIModel=${OPENAI_MODEL:-gpt-4.1-nano}"
            "JwtSecret=$JWT_SECRET"
            "InviteBaseUrl=${INVITE_BASE_URL:-exdox://signup}"
            "ReceiptStoreMode=${RECEIPT_STORE_MODE:-s3}"
            "DbIamAuthEnabled=${DB_IAM_AUTH_ENABLED:-false}"
            "DbIamRegion=${DB_IAM_REGION:-eu-west-2}"
            "StripeCheckoutSuccessUrl=${STRIPE_CHECKOUT_SUCCESS_URL:-https://app.exdox.co.uk/billing?checkout=success}"
            "StripeCheckoutCancelUrl=${STRIPE_CHECKOUT_CANCEL_URL:-https://app.exdox.co.uk/billing?checkout=cancelled}"
            "StripeBillingPortalReturnUrl=${STRIPE_BILLING_PORTAL_RETURN_URL:-https://app.exdox.co.uk/billing}"
          )

          add_if_set "InviteEmailFrom" "$INVITE_EMAIL_FROM"
          add_if_set "DbHost" "$DB_HOST"
          add_if_set "DbPort" "$DB_PORT"
          add_if_set "DbName" "$DB_NAME"
          add_if_set "DbUser" "$DB_USER"
          add_if_set "DbPassword" "$DB_PASSWORD"
          add_if_set "StripeSecretKey" "$STRIPE_SECRET_KEY"
          add_if_set "StripeWebhookSecret" "$STRIPE_WEBHOOK_SECRET"
          add_if_set "StripePriceCaptureMonthly" "$STRIPE_PRICE_CAPTURE_MONTHLY"
          add_if_set "StripePriceCaptureAnnual" "$STRIPE_PRICE_CAPTURE_ANNUAL"
          add_if_set "StripePriceControlMonthly" "$STRIPE_PRICE_CONTROL_MONTHLY"
          add_if_set "StripePriceControlAnnual" "$STRIPE_PRICE_CONTROL_ANNUAL"
          add_if_set "StripePriceOperationsMonthly" "$STRIPE_PRICE_OPERATIONS_MONTHLY"
          add_if_set "StripePriceOperationsAnnual" "$STRIPE_PRICE_OPERATIONS_ANNUAL"
          add_if_set "StripePriceEnterpriseMonthly" "$STRIPE_PRICE_ENTERPRISE_MONTHLY"
          add_if_set "StripePriceEnterpriseAnnual" "$STRIPE_PRICE_ENTERPRISE_ANNUAL"

          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --s3-bucket "$RECEIPT_BUCKET_NAME" \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides "${parameter_overrides[@]}"
